<svg width="800" height="520" viewBox="0 0 800 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Image scaling modes</title>
  <desc id="desc">Three frames comparing fit, fill, and clipped image behavior.</desc>
  <rect width="800" height="520" rx="26" fill="#F7F2E8"/>
  <rect x="52" y="108" width="216" height="304" rx="16" fill="#FFFFFF" stroke="#CC8B2D" stroke-width="3"/>
  <rect x="292" y="108" width="216" height="304" rx="16" fill="#FFFFFF" stroke="#0F6278" stroke-width="3"/>
  <rect x="532" y="108" width="216" height="304" rx="16" fill="#FFFFFF" stroke="#1E7A61" stroke-width="3"/>
  <rect x="80" y="148" width="160" height="180" rx="12" fill="#DDEAF5"/>
  <rect x="320" y="130" width="160" height="220" rx="12" fill="#DDEAF5"/>
  <rect x="560" y="166" width="160" height="148" rx="12" fill="#DDEAF5"/>
  <text x="110" y="380" fill="#10263D" font-family="Avenir Next, sans-serif" font-size="22" font-weight="700">scaledToFit</text>
  <text x="351" y="380" fill="#10263D" font-family="Avenir Next, sans-serif" font-size="22" font-weight="700">scaledToFill</text>
  <text x="599" y="380" fill="#10263D" font-family="Avenir Next, sans-serif" font-size="22" font-weight="700">clipped</text>
</svg>
