<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>コース | Code EJ</title>
    <meta
      name="description"
      content="作成課題向けの3つの実践コースをまとめたページです。"
    />
    <link rel="stylesheet" href="../css/base.css" />
    <link rel="stylesheet" href="../css/layout.css" />
    <link rel="stylesheet" href="../css/components.css" />
    <link rel="stylesheet" href="../css/pages.css" />
    <script src="../js/main.js" defer></script>
  </head>
  <body data-page="course">
    <header class="site-header" data-shared-header></header>

    <main>
      <div class="container flow">
        <section class="panel fade-up flow">
          <div class="section-title"><h2>コース</h2></div>
          <p>学習で制作するアプリコースを選んで取り組んでみましょう。</p>
          <div class="grid-3">
            <article class="card flow">
              <h3>チャットアプリの作成</h3>
              <p>メッセージ一覧、入力欄、送信フローなどの基本を実装します。</p>
            </article>
            <article class="card flow">
              <h3>ポケモン図鑑アプリの作成</h3>
              <p>カード表示や詳細画面を作りながら、データ表示の流れを学びます。</p>
            </article>
            <article class="card flow">
              <h3>リマインダーアプリの作成</h3>
              <p>タスク追加・完了管理を通じて、状態管理の基礎を身につけます。</p>
            </article>
          </div>
        </section>
      </div>
    </main>
    <footer class="site-footer" data-shared-footer></footer>
  </body>
</html>
