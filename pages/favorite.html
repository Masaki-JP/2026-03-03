<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Favorite | Code EJ</title>
    <meta name="description" content="SwiftUI一覧からピックアップしたお気に入り5項目。" />
    <link rel="stylesheet" href="../css/base.css" />
    <link rel="stylesheet" href="../css/layout.css" />
    <link rel="stylesheet" href="../css/components.css" />
    <link rel="stylesheet" href="../css/pages.css" />
    <script src="../js/main.js" defer></script>
  </head>
  <body data-page="favorites">
    <header class="site-header" data-shared-header></header>

    <main>
      <div class="container flow">
        <section class="panel fade-up flow">
          <div class="section-title"><h2>お気に入り5項目</h2></div>
          <div class="grid-3">
            <a class="card card-link" href="swiftui-detail.html?item=text" aria-label="Text の詳細ページへ"><h3>Text</h3><p>文字列を表示。</p></a>
            <a class="card card-link" href="swiftui-detail.html?item=vstack" aria-label="VStack の詳細ページへ"><h3>VStack</h3><p>縦方向にビューを並べる。</p></a>
            <a class="card card-link" href="swiftui-detail.html?item=padding" aria-label="padding(_:) の詳細ページへ"><h3>padding(_:)</h3><p>内側余白を追加。</p></a>
            <a class="card card-link" href="swiftui-detail.html?item=overlay-alignment" aria-label="overlay(_:alignment:) の詳細ページへ"><h3>overlay(_:alignment:)</h3><p>前面に別ビューを重ねる。</p></a>
            <a class="card card-link" href="swiftui-detail.html?item=shadow-shadow" aria-label="shadow(color:radius:x:y:) の詳細ページへ"><h3>shadow(color:radius:x:y:)</h3><p>影を追加して立体感を出す。</p></a>
          </div>
        </section>
      </div>
    </main>
    <footer class="site-footer" data-shared-footer></footer>
