<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>問い合わせ | Code EJ</title>
    <meta name="description" content="Code EJへの問い合わせページ。学習内容への質問やサイト改善要望を受け付けています。" />
    <link rel="stylesheet" href="../css/base.css" />
    <link rel="stylesheet" href="../css/layout.css" />
    <link rel="stylesheet" href="../css/components.css" />
    <link rel="stylesheet" href="../css/pages.css" />
    <script src="../js/main.js" defer></script>
    <script src="../js/code-switcher.js" defer></script>
  </head>
  <body data-page="contact">
    <header class="site-header">
      <div class="container header-inner">
        <a class="brand" href="../index.html">Code EJ</a>
        <button class="menu-toggle" type="button" data-menu-toggle aria-expanded="false" aria-controls="global-nav">メニュー</button>
        <nav class="site-nav" aria-label="主要ナビゲーション">
          <ul id="global-nav" class="site-nav-list" data-menu-panel>
            <li><a href="swiftui.html" data-nav-link="swiftui">SwiftUI</a></li>
            <li><a href="favorite.html" data-nav-link="favorites">Favorite</a></li>
            <li><a href="account.html" data-nav-link="account">Account</a></li>
          </ul>
        </nav>
      </div>
    </header>
    <main>
      <div class="container flow">
        <section class="panel lesson-header fade-up">
          <h1>問い合わせ</h1>
          <p>ご質問・改善提案などを受け付けています。以下のフォームは静的デモです。</p>
        </section>

        <section class="panel fade-up">
          <form>
            <label>
              お名前
              <input type="text" placeholder="例: 山田 花子" />
            </label>
            <label>
              メールアドレス
              <input type="email" placeholder="you@example.com" />
            </label>
            <label>
              件名
              <input type="text" placeholder="例: overlayの記事について" />
            </label>
            <label>
              メッセージ
              <textarea rows="5" placeholder="ご意見・ご要望"></textarea>
            </label>
            <button class="button-primary" type="button">送信（デモ）</button>
          </form>
        </section>

        <section class="panel fade-up flow">
          <div class="section-title"><h2>関連ページ</h2></div>
          <div class="grid-3">
            <a class="inline-link-card" href="roadmap.html">学習ロードマップ</a>
            <a class="inline-link-card" href="../index.html">トップページ</a>
          </div>
        </section>
      </div>
    </main>
    <footer class="site-footer" data-shared-footer></footer>
</body>
</html>
